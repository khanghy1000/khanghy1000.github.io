<!DOCTYPE html>
<html>
<body>

<p>Nhấn vào đây để lấy toạ độ.</p>

<button onclick="getLocation()">Lấy toạ độ</button>

<p id="demo"></p>

<script>
var x = document.getElementById("demo");

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(showPosition);
  } else { 
    x.innerHTML = "Geolocation không hỗ trợ trên trình duyệt này.";
  }
}

function showPosition(position) {
  x.innerHTML = "Vĩ độ: " + position.coords.latitude + 
  "<br>Kinh độ: " + position.coords.longitude;
}
</script>

</body>
</html>
